<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Sensor Logs</title>

<style>
:root {
    --primary: #00d2ff;
    --accent: #00ffaa;
    --dark: #1a1a2e;
    --bg: #0f3460;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: var(--dark);
    padding: 20px;
    border-right: 1px solid var(--primary);
}

.sidebar h2 {
    color: var(--primary);
}

.nav-item {
    padding: 15px 0;
    border-bottom: 1px solid #333;
    opacity: 0.7;
}

.nav-item.active {
    opacity: 1;
    color: var(--primary);
}

/* Main */
.main {
    flex-grow: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn {
    border: 1px solid var(--primary);
    background: transparent;
    color: var(--primary);
    padding: 8px 15px;
    cursor: pointer;
}

.btn:hover {
    background: var(--primary);
    color: black;
}

/* Table */
.table-container {
    margin-top: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow-y: auto;
    flex-grow: 1;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: center;
}

th {
    background: var(--dark);
    color: var(--primary);
    position: sticky;
    top: 0;
}

/* Highlight */
.bend {
    color: red;
    font-weight: bold;
}

.normal {
    color: var(--accent);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>FLEX CONTROL</h2>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Hand Mapping</div>
    <div class="nav-item active">Logs</div>
</div>

<div class="main">

    <div class="header">
        <h2>CH1–CH6 Sensor Logs</h2>
        <button class="btn" onclick="clearLogs()">Clear Logs</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>CH1</th>
                    <th>CH2</th>
                    <th>CH3</th>
                    <th>CH4</th>
                    <th>CH5</th>
                    <th>CH6</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

</div>

<script>

const logBody = document.getElementById("logBody");
const THRESHOLD = 850;   // 🔥 Higher threshold = more NORMAL
const MAX_ROWS = 50;

function addLogRow() {

    const time = new Date().toLocaleTimeString();
    let row = document.createElement("tr");

    let html = `<td>${time}</td>`;
    let bend = false;

    for(let i=1; i<=6; i++) {

        // 🔥 Mostly NORMAL values
        let val = Math.floor(Math.random()*900);

        // Rare high spike
        if(Math.random() > 0.9){
            val = Math.floor(Math.random()*1000);
        }

        if(val > THRESHOLD){
            bend = true;
            html += `<td class="bend">${val} (BEND)</td>`;
        } else {
            html += `<td>${val}</td>`;
        }
    }

    // Status
    if(bend){
        html += `<td class="bend">BEND DETECTED</td>`;
    } else {
        html += `<td class="normal">NORMAL</td>`;
    }

    row.innerHTML = html;

    logBody.insertBefore(row, logBody.firstChild);

    if(logBody.children.length > MAX_ROWS){
        logBody.removeChild(logBody.lastChild);
    }
}

// Clear Logs
function clearLogs(){
    logBody.innerHTML = "";
}

// Auto update
setInterval(addLogRow, 500);

</script>

</body>
</html>
